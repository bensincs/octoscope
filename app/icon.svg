<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ad7ff"/>
      <stop offset="55%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded backdrop so the mark reads on any tab color -->
  <rect x="0" y="0" width="16" height="16" rx="4" fill="#0d1117"/>
  <!-- Cat ears + head -->
  <g fill="#f0f6fc">
    <path d="M5.7 5.2 4.4 2.5 7.2 4.2 Z"/>
    <path d="M10.3 5.2 11.6 2.5 8.8 4.2 Z"/>
    <rect x="3.1" y="4.4" width="9.8" height="8.4" rx="2.6"/>
  </g>
  <!-- Sensor antenna -->
  <line x1="8" y1="4.4" x2="8" y2="2.3" stroke="url(#scan)" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="8" cy="1.9" r="0.95" fill="url(#scan)"/>
  <!-- Side bolts -->
  <circle cx="3.1" cy="8.6" r="0.7" fill="url(#scan)"/>
  <circle cx="12.9" cy="8.6" r="0.7" fill="url(#scan)"/>
  <!-- Scanner eyes -->
  <rect x="4.9" y="7" width="2.3" height="1.9" rx="0.85" fill="url(#scan)"/>
  <rect x="8.8" y="7" width="2.3" height="1.9" rx="0.85" fill="url(#scan)"/>
  <circle cx="5.7" cy="7.7" r="0.38" fill="#d6f5ff" fill-opacity="0.95"/>
  <circle cx="9.6" cy="7.7" r="0.38" fill="#d6f5ff" fill-opacity="0.95"/>
  <!-- Grille mouth -->
  <g stroke="url(#scan)" stroke-width="0.62" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="6.7" y1="10.2" x2="6.7" y2="11.2"/>
    <line x1="8" y1="10.1" x2="8" y2="11.3"/>
    <line x1="9.3" y1="10.2" x2="9.3" y2="11.2"/>
  </g>
</svg>
